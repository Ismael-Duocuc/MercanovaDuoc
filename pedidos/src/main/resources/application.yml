server:
  port: 8086

spring:
  application:
    name: Pedidos
  datasource:
    url: jdbc:mysql://localhost:3306/db_pedidos
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect