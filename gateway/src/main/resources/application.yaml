server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: clientes
          uri: http://localhost:8081
          predicates:
            - Path=/api/clientes/**
        - id: productos
          uri: http://localhost:8082
          predicates:
            - Path=/api/productos/**
        - id: categorias
          uri: http://localhost:8083
          predicates:
            - Path=/api/categorias/**
        - id: proveedores
          uri: http://localhost:8084
          predicates:
            - Path=/api/proveedores/**
        - id: descuentos
          uri: http://localhost:8085
          predicates:
            - Path=/api/descuentos/**
        - id: pedidos
          uri: http://localhost:8086
          predicates:
            - Path=/api/pedidos/**
        - id: envios
          uri: http://localhost:8087
          predicates:
            - Path=/api/envios/**
        - id: carrito
          uri: http://localhost:8088
          predicates:
            - Path=/api/carrito/**
        - id: pago
          uri: http://localhost:8089
          predicates:
            - Path=/api/pagos/**
        - id: inventario
          uri: http://localhost:8090
          predicates:
            - Path=/api/inventario/**