server:
  port: 8089

spring:
  application:
    name: Pago
  datasource:
    url: jdbc:mysql://localhost:3306/db_pago
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

servicios:
  pedidos:
    url: ${PEDIDOS_URL:http://localhost:8086}
  descuentos:
    url: ${DESCUENTOS_URL:http://localhost:8085}